# Maintenance Loop — Automatic Issue Processing
# Trigger: Issues with specific labels are automatically processed
# Configurable: Labels, timeout, secrets

name: Maintenance Loop

on:
  issues:
    types: [opened, labeled]

# Only one maintenance job at a time per issue
concurrency:
  group: maintenance-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # Pre-filter: Validate the issue before spending API credits
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check issue eligibility
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const allowedLabels = ['bug', 'feature', 'change', 'automate'];
            const hasAllowedLabel = labels.some(l => allowedLabels.includes(l));

            // Skip bot-created issues to prevent loops
            const author = issue.user.login;
            const isBotAuthor = author.endsWith('[bot]') || author === 'github-actions';

            if (!hasAllowedLabel) {
              core.info(`Skipping: no matching label (has: ${labels.join(', ')})`);
              core.setOutput('should_run', 'false');
              return;
            }

            if (isBotAuthor) {
              core.info(`Skipping: bot author (${author})`);
              core.setOutput('should_run', 'false');
              return;
            }

            core.info(`Processing issue #${issue.number} by ${author} with labels: ${labels.join(', ')}`);
            core.setOutput('should_run', 'true');

  maintain:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Maintenance
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx orchestrate maintain ${{ github.event.issue.number }}

      # PR is created via peter-evans/create-pull-request
      # The orchestrator only pushes the branch, does not create a PR
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/issue-${{ github.event.issue.number }}
          title: "fix: resolve #${{ github.event.issue.number }}"
          body: |
            Automatically generated for issue #${{ github.event.issue.number }}

            ---
            *Created by sveltekit-orchestrator*
          labels: automated
